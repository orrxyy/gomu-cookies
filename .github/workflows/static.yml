name: Deploy GOMU Cookies

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # Baris di bawah penting karena package.json kamu ada di dalam folder
          cache-dependency-path: gomu-cookies/package-lock.json

      - name: Install dependencies
        run: |
          cd gomu-cookies
          npm install

      - name: Build project
        run: |
          cd gomu-cookies
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Arahkan ke folder 'dist' hasil build yang ada di dalam gomu-cookies
          path: './gomu-cookies/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
